server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ===== 子路径部署 /documentReview/（方案 A：平台把整段 /documentReview/ 转发到本容器，不剥前缀）=====
    # 仅当镜像以 APP_BASE=/documentReview/ 构建时，前端资源/接口/WS 才会走这些路径；
    # 默认根路径构建时这些 location 不会被命中，保留无害。

    # 接口：剥掉 /documentReview 前缀转发到后端 /api/
    location /documentReview/api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /documentReview;
        client_max_body_size 200M;
    }

    # WebSocket：剥掉 /documentReview 前缀转发到后端 /ws/
    location /documentReview/ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # 静态资源 + SPA 回退（子路径）
    location /documentReview/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /documentReview/index.html;
    }

    # ===== 根路径部署（默认）=====
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 200M;
    }

    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
