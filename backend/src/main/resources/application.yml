server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/ai_review
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB
      max-request-size: 210MB

  lifecycle:
    timeout-per-shutdown-phase: 5s

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      # Let PostgreSQL JDBC parse the complete script so dollar-quoted DO blocks
      # are not incorrectly split at their internal semicolons by Spring.
      separator: "^^^ END OF SCRIPT ^^^"

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT Configuration
jwt:
  secret: Y2hhbmdlLXRoaXMtdG8tYS1zZWN1cmUtcmFuZG9tLWtleS1pbi1wcm9kdWN0aW9uLWF0LWxlYXN0LTI1Ni1iaXRz
  access-token-expiration: 3600000      # 1 hour
  refresh-token-expiration: 604800000   # 7 days

# File upload storage
file:
  upload-dir: ./uploads
  rules-dir: ./uploads/rules
  documents-dir: ./uploads/documents

# Async thread pool
async:
  core-pool-size: 4
  max-pool-size: 8
  queue-capacity: 100
  thread-name-prefix: review-task-

# AI review
review:
  retry:
    # 4 次尝试 = 3 次重试，节奏 1s → 2s → 4s 指数退避（总等待 7s）。
    # 比之前 5 次 × 6s = 24s 大幅缩短，但仍能吸收常见的瞬时抖动。
    # callWithRetry 只对 IOException / HTTP 5xx / 429 重试；4xx 立即失败。
    max-attempts: 4
    interval-ms: 1000
  chunk:
    max-tokens: 25600
    overlap-tokens: 0
  parallel:
    # 单个文档内切片并发调用 AI 的最大并发数。AI 调用以网络等待为主，
    # 提高并发可线性缩短审查耗时；上限由模型提供方的 RPM/并发配额决定。
    # chunkReviewExecutor 池子大小 = 此值 × async.max-pool-size，会自动跟随，
    # 因此调这一处即可，不需要动 AsyncConfig。
    chunk-concurrency: 6
  dispatch:
    # 一级章节号不大于该值时，仅执行内置文字质量检查，不注入业务规则。
    # 设为 0 可关闭此档位，恢复所有章节按规则元数据正常调度。
    # 这是当前试验大纲模板的过渡配置；长期应将业务规则维护为
    # section_specific，并通过适用章节/关键词精确分发。
    basic-only-max-chapter: 6
  rag:
    # 注：enabled / fallback-to-legacy 已废弃（RAG 与 CHUNK 现在通过前端侧边栏二选一
    # 进入，两条管线物理隔离、独立运行）。保留下面的 RAG 调参以便 RagReviewService
    # 复用同一组 review.rag.* 配置。
    check-concurrency: 4
    failed-check-retry-attempts: 1
    block-max-chars: 1800
    embedding-batch-size: 24
    # 成本/召回平衡调参（仅嵌入 + pgvector 检索，不耗 chat token）：
    #   recall-top-k        向量召回候选数（可适当大）
    #   evidence-max-blocks rerank 后送入分组评估的证据块上限（每检查项）
    recall-top-k: 30
    evidence-max-blocks: 10
    # 分组评估（按章节聚合检查项、一次调用评估多项）—— 把"每检查项一次调用、原文重发 N 遍"
    # 降到"每章节一次调用、原文发一遍"，是 RAG 降 token 的核心。
    #   max-checks-per-call  一次调用最多评估多少个检查项（越大越省，受 max_tokens 约束）
    #   max-evidence-per-call 一次调用共享的证据块上限（去重后按召回分取前 N）
    max-checks-per-call: 8
    max-evidence-per-call: 16
    # 两阶段复核：对每条非 Pass 违规再各发一次 AI 复判，仅给"已确认/待定"标签，
    # 对召回毫无帮助，却会让 AI 调用数翻数倍（N 条问题 = N 次额外调用）。
    # 默认关闭以控制成本；确需精度标注时再手动开。
    verify:
      enabled: false
    vector-index:
      enabled: true
      hnsw-ef-search: 100
      binary-candidate-multiplier: 4
  # SAR（结构化精准审查）管线参数 —— 与 RAG/CHUNK 物理隔离的第三套方案。
  # 引擎：三路并联路由(结构+词法+语义) → 区域级取证 → 清单式缺失检测 → 自适应复核 → 跨章一致性。
  sar:
    check-concurrency: 4
    failed-check-retry-attempts: 1
    block-max-chars: 1800
    embedding-batch-size: 24
    recall-top-k: 30                  # 语义路由的向量召回候选数
    evidence-max-blocks: 10           # 三路皆未命中时的回退取证块数
    max-checks-per-call: 8            # 同区域检查项分组的箱容量
    max-evidence-per-call: 16         # 单次分组调用的证据块上限
    region-max-blocks: 14             # 区域级取证：命中区域送入模型的整段块数上限
    route-confidence-threshold: 0.45  # 低于此路由置信度 → 降级 needs_review、优先复核
    verify:
      enabled: false                 # 自适应复核总开关（默认关；开启≈每条不确定违规多一次调用）
      adaptive: true                 # 仅复核低置信/定位不确定项（而非全量）
    consistency:
      enabled: true                  # 跨章一致性核对（抽取关键实体、查跨章节矛盾）
    vector-index:
      enabled: true
      hnsw-ef-search: 100
      binary-candidate-multiplier: 4
  # v2 管线提示词 → rule_checks 迁移配置。
  # 把 run-on-startup 改成 true 并重启一次，迁移会跑一遍并把 markdown 报告
  # 写到 report-dir；看完报告后改回 false。
  prompts:
    path: ./prompts/prompts/prompts.json
    migration:
      run-on-startup: false
      report-dir: ./output/migration-reports

logging:
  level:
    com.aireview: DEBUG
    com.baomidou.mybatisplus: DEBUG
