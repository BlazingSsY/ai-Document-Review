server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/ai_review
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB
      max-request-size: 210MB

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT Configuration
jwt:
  secret: Y2hhbmdlLXRoaXMtdG8tYS1zZWN1cmUtcmFuZG9tLWtleS1pbi1wcm9kdWN0aW9uLWF0LWxlYXN0LTI1Ni1iaXRz
  access-token-expiration: 3600000      # 1 hour
  refresh-token-expiration: 604800000   # 7 days

# File upload storage
file:
  upload-dir: ./uploads
  rules-dir: ./uploads/rules
  documents-dir: ./uploads/documents

# Async thread pool
async:
  core-pool-size: 4
  max-pool-size: 8
  queue-capacity: 100
  thread-name-prefix: review-task-

# AI review
review:
  retry:
    max-attempts: 3
    interval-ms: 5000
  chunk:
    max-tokens: 6000
    overlap-tokens: 200

logging:
  level:
    com.aireview: DEBUG
    com.baomidou.mybatisplus: DEBUG
