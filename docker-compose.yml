services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16
    container_name: ai-review-db
    restart: unless-stopped
    mem_limit: 1g
    environment:
      POSTGRES_DB: ai_review
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-review-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-review-backend
    restart: unless-stopped
    mem_limit: 2g
    stop_grace_period: 10s
    ports:
      - "8080:8080"
    environment:
      # Let the JVM size its heap from the container's mem_limit (container-aware on JDK 17).
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai_review
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
      # Re-run schema.sql on every backend startup. schema.sql is fully idempotent
      # (CREATE TABLE IF NOT EXISTS / ALTER TABLE ... ADD COLUMN IF NOT EXISTS /
      # INSERT ... ON CONFLICT DO NOTHING), so this gives us auto-applied
      # migrations without needing to drop the postgres_data volume.
      SPRING_SQL_INIT_MODE: always
      JWT_SECRET: Y2hhbmdlLXRoaXMtdG8tYS1zZWN1cmUtcmFuZG9tLWtleS1pbi1wcm9kdWN0aW9uLWF0LWxlYXN0LTI1Ni1iaXRz
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - upload_files:/app/uploads
      - ./output:/app/output
      # v2 PromptsMigrationRunner reads prompts.json from this mount when
      # review.prompts.migration.run-on-startup=true.
      - ./prompts:/app/prompts:ro
    networks:
      - ai-review-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 子路径部署：APP_BASE=/office-app/ docker compose build frontend；默认根路径 /。
        APP_BASE: ${APP_BASE:-/}
    container_name: ai-review-frontend
    restart: unless-stopped
    mem_limit: 256m
    ports:
      - "3030:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-review-net

networks:
  ai-review-net:
    driver: bridge

volumes:
  postgres_data:
  upload_files:
